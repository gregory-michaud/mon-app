name: deploy-html
on: [push]
jobs:
  build:
    runs-on: runner-linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
      - name: Install dependencies
        run: npm install
      - name: Start project # démarrage
        run: npm run start